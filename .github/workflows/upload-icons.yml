name: Upload Icons to GCS

on:
  push:
    branches: [main]
    paths:
      - "logos/**.svg"
  workflow_dispatch:
    inputs:
      files:
        description: 'SVGs to upload — "all", or space-separated paths (e.g. logos/remove-bg.svg)'
        required: false
        default: all

jobs:
  upload:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so we can diff the whole push range (before..after),
          # not just the tip commit.
          fetch-depth: 0

      - name: Detect SVGs to upload
        id: diff
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          DISPATCH_FILES: ${{ github.event.inputs.files }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -z "${DISPATCH_FILES:-}" ] || [ "$DISPATCH_FILES" = "all" ]; then
              FILES=$(find logos -type f -name '*.svg' | sort)
            else
              FILES=""
              for f in $DISPATCH_FILES; do
                if [ -f "$f" ]; then
                  FILES=$(printf '%s\n%s' "$FILES" "$f")
                else
                  echo "::warning::Requested file not found, skipping: $f"
                fi
              done
            fi
          else
            # Diff the entire push range so multi-commit pushes (rebase merges, PRs
            # with >1 commit, an empty trailing commit) don't drop files. Falls back
            # to HEAD~1..HEAD when `before` is missing/unreachable (e.g. force-push).
            if [ -z "${BEFORE_SHA:-}" ] \
               || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ] \
               || ! git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
              RANGE_ARGS="$(git rev-parse HEAD~1) HEAD"
            else
              RANGE_ARGS="$BEFORE_SHA $AFTER_SHA"
            fi
            FILES=$(git diff --diff-filter=ACM --name-only $RANGE_ARGS -- 'logos/*.svg')
          fi

          FILES=$(printf '%s\n' "$FILES" | grep -v '^$' | sort -u || true)
          if [ -z "$FILES" ]; then
            echo "No new or changed SVGs found."
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          else
            echo "$FILES"
            echo "has_files=true" >> "$GITHUB_OUTPUT"
            echo "$FILES" > /tmp/changed_svgs.txt
          fi

      - name: Authenticate to Google Cloud
        if: steps.diff.outputs.has_files == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        if: steps.diff.outputs.has_files == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload SVGs to GCS
        if: steps.diff.outputs.has_files == 'true'
        run: |
          while IFS= read -r file; do
            filename=$(basename "$file")
            echo "Uploading $filename..."
            gsutil -h "Cache-Control:public, max-age=86400" \
              cp "$file" "gs://${{ secrets.GCS_BUCKET }}/connectors/$filename"
          done < /tmp/changed_svgs.txt
          echo "Done. Uploaded $(wc -l < /tmp/changed_svgs.txt | tr -d ' ') file(s)."
